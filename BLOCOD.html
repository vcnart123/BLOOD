<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血壓影像紀錄小幫手</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --lake-green: #20B2AA;
            --lake-green-light: rgba(32, 178, 170, 0.15);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f5f5;
            color: #333;
        }
        h2 { text-align: center; color: var(--lake-green); font-size: 1.2rem; }
        
        /* 左右各半版面設計 */
        .split-container {
            display: flex;
            gap: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .left-panel, .right-panel {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
        }

        /* 左側：上傳與縮圖區塊 */
        .upload-btn {
            background-color: var(--lake-green);
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input[type="file"] { display: none; }
        .thumbnail-container {
            flex: 1;
            border: 2px dashed #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fafafa;
        }
        #thumbnail { max-width: 100%; max-height: 250px; display: none; border-radius: 5px; object-fit: contain; }

        /* 右側：手動修改區塊 */
        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            box-sizing: border-box;
            background: #fff;
        }
        .submit-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: auto;
        }

        /* 圖表與匯出區塊 */
        .chart-container {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .export-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <h2>血壓影像紀錄小幫手</h2>

    <div class="split-container">
        <div class="left-panel">
            <label class="upload-btn">
                📸 上傳照片
                <input type="file" id="photoUpload" accept="image/*">
            </label>
            <div class="thumbnail-container">
                <span id="thumbnail-placeholder" style="color:#aaa; font-size:0.8rem;">照片縮圖</span>
                <img id="thumbnail" alt="縮圖">
            </div>
        </div>

        <div class="right-panel">
            <div class="input-group">
                <label>量測時間：年/月/日/點/分</label>
                <input type="datetime-local" id="measTime" required>
            </div>
            
            <div class="input-group">
                <label>收縮壓 (mmHg)</label>
                <input type="number" id="sys" list="sys-options" placeholder="輸入或下拉選擇" required>
            </div>
            
            <div class="input-group">
                <label>舒張壓 (mmHg)</label>
                <input type="number" id="dia" list="dia-options" placeholder="輸入或下拉選擇" required>
            </div>
            
            <div class="input-group">
                <label>脈搏 (次/分)</label>
                <input type="number" id="pulse" list="pulse-options" placeholder="輸入或下拉選擇" required>
            </div>

            <button class="submit-btn" onclick="saveRecord()">送出紀錄</button>
        </div>
    </div>

    <datalist id="sys-options"></datalist>
    <datalist id="dia-options"></datalist>
    <datalist id="pulse-options"></datalist>

    <div class="chart-container" id="pdf-area">
        <canvas id="bpChart"></canvas>
    </div>

    <button class="export-btn" onclick="exportPDF()">⬇️ 匯出 PDF 檔</button>

    <script>
        let bpRecords = []; // 儲存紀錄的陣列
        let bpChartInstance = null;

        // 初始化下拉輔助選單的數值範圍
        window.onload = () => {
            const generateOptions = (id, min, max) => {
                const datalist = document.getElementById(id);
                for (let i = min; i <= max; i++) {
                    let option = document.createElement('option');
                    option.value = i;
                    datalist.appendChild(option);
                }
            };
            generateOptions('sys-options', 80, 200);
            generateOptions('dia-options', 50, 130);
            generateOptions('pulse-options', 40, 150);
            
            // 預設填入當下時間
            setDateTimeInput(new Date());
        };

        // 格式化時間放入 datetime-local (YYYY-MM-DDThh:mm)
        function setDateTimeInput(dateObj) {
            const offset = dateObj.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(dateObj - offset)).toISOString().slice(0, 16);
            document.getElementById('measTime').value = localISOTime;
        }

        // 1. 處理照片上傳與讀取時間
        document.getElementById('photoUpload').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 產生縮圖
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('thumbnail').src = e.target.result;
                document.getElementById('thumbnail').style.display = 'block';
                document.getElementById('thumbnail-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);

            // 嘗試解析照片建立時間 (EXIF)
            try {
                let exifData = await exifr.parse(file);
                if (exifData && exifData.DateTimeOriginal) {
                    setDateTimeInput(new Date(exifData.DateTimeOriginal));
                } else {
                    // 若無 EXIF，退回使用檔案最後修改時間
                    setDateTimeInput(new Date(file.lastModified));
                }
            } catch (err) {
                // 發生錯誤則使用檔案系統時間
                setDateTimeInput(new Date(file.lastModified));
            }
        });

        // 2. 送出紀錄並更新圖表
        function saveRecord() {
            const timeVal = document.getElementById('measTime').value;
            const sysVal = document.getElementById('sys').value;
            const diaVal = document.getElementById('dia').value;
            const pulseVal = document.getElementById('pulse').value;

            if (!timeVal || !sysVal || !diaVal || !pulseVal) {
                alert("請填寫完整的時間與血壓、脈搏數值！");
                return;
            }

            // 存入陣列
            bpRecords.push({
                timeRaw: new Date(timeVal),
                timeStr: timeVal.replace('T', ' '),
                dateStr: timeVal.split('T')[0], // 取出日期用於背景顏色
                sys: parseInt(sysVal),
                dia: parseInt(diaVal),
                pulse: parseInt(pulseVal)
            });

            // 依時間排序
            bpRecords.sort((a, b) => a.timeRaw - b.timeRaw);
            
            // 清空輸入框（保留時間以利連續輸入）
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('pulse').value = '';

            renderChart();
        }

        // 3. 繪製圖表 (包含客製化雙色背景外掛)
        function renderChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            
            const labels = bpRecords.map(r => r.timeStr);
            const sysData = bpRecords.map(r => r.sys);
            const diaData = bpRecords.map(r => r.dia);

            // 銷毀舊圖表以重新渲染
            if (bpChartInstance) { bpChartInstance.destroy(); }

            // 客製化背景外掛：依照日期交替湖水綠與白色
            const dateBackgroundPlugin = {
                id: 'dateBackgroundPlugin',
                beforeDraw: (chart) => {
                    const {ctx, chartArea: {top, bottom, left, right}, scales: {x}} = chart;
                    let currentBg = 'rgba(32, 178, 170, 0.15)'; // 湖水綠 (半透明)
                    let lastDate = null;
                    let startX = left;

                    ctx.save();
                    for (let i = 0; i < bpRecords.length; i++) {
                        const recDate = bpRecords[i].dateStr;
                        // 當遇到新的日期時
                        if (lastDate !== recDate) {
                            if (lastDate !== null) {
                                // 計算區塊終點 (取兩點中間的像素位置)
                                let endX = x.getPixelForTick(i) - (x.getPixelForTick(i) - x.getPixelForTick(i-1)) / 2;
                                ctx.fillStyle = currentBg;
                                ctx.fillRect(startX, top, endX - startX, bottom - top);
                                startX = endX;
                                // 交替顏色
                                currentBg = currentBg === 'rgba(32, 178, 170, 0.15)' ? '#ffffff' : 'rgba(32, 178, 170, 0.15)';
                            }
                            lastDate = recDate;
                        }
                    }
                    // 畫最後一個區塊到圖表右邊緣
                    ctx.fillStyle = currentBg;
                    ctx.fillRect(startX, top, right - startX, bottom - top);
                    ctx.restore();
                }
            };

            bpChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '收縮壓',
                            data: sysData,
                            borderColor: '#d9534f',
                            backgroundColor: '#d9534f',
                            tension: 0.3,
                            borderWidth: 2
                        },
                        {
                            label: '舒張壓',
                            data: diaData,
                            borderColor: '#5bc0de',
                            backgroundColor: '#5bc0de',
                            tension: 0.3,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { ticks: { maxRotation: 45, minRotation: 45, font: { size: 10 } } },
                        y: { suggestedMin: 40, suggestedMax: 180 }
                    }
                },
                plugins: [dateBackgroundPlugin]
            });
        }

        // 4. 匯出 PDF 功能
        function exportPDF() {
            const element = document.getElementById('pdf-area');
            const opt = {
                margin:       0.5,
                filename:     `血壓紀錄圖表_${new Date().toISOString().slice(0,10)}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
            };
            
            // 使用 html2pdf.js 執行匯出
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
