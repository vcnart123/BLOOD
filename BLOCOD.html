<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>血壓記錄小幫手</title>
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary-color: #4A90E2;
      --bg-color: #f4f7f6;
      --box-bg: #ffffff;
      --text-color: #333;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 15px;
    }
    h2 {
      text-align: center;
      color: var(--primary-color);
      font-size: 1.5rem;
    }
    /* 手機優先的卡片式設計 */
    .card {
      background: var(--box-bg);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .upload-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      text-align: center;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      box-sizing: border-box;
    }
    input[type="file"] {
      display: none;
    }
    /* 縮圖與輸入區塊同時呈現 */
    .work-area {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 15px;
    }
    .thumbnail-container {
      width: 100%;
      text-align: center;
      background: #eee;
      border-radius: 8px;
      overflow: hidden;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img#thumbnail {
      max-width: 100%;
      max-height: 200px;
      display: none;
      object-fit: contain;
    }
    /* 縱向依序排列的輸入表單 */
    .input-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }
    .input-group label {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 0.95rem;
    }
    /* 修改框寬度適中，適合手機點擊 */
    .input-group input {
      width: 100%;
      padding: 10px;
      font-size: 1.1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #2ECC71;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    /* 圖表容器 */
    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h2>📱 影像血壓記錄</h2>

  <div class="card">
    <label class="upload-btn">
      📸 從相簿選擇照片上傳
      <input type="file" id="photoInput" accept="image/*">
    </label>

    <div class="work-area">
      <div class="thumbnail-container">
        <span id="no-image-text">尚未選擇照片</span>
        <img id="thumbnail" src="" alt="血壓機照片縮圖">
      </div>

      <form id="bpForm">
        <div class="input-group">
          <label for="measureTime">量測時間 (年/月/日/點/分)：</label>
          <input type="datetime-local" id="measureTime" required>
        </div>
        
        <div class="input-group">
          <label for="diastolic">舒張壓 (低壓)：</label>
          <input type="number" id="diastolic" list="dia-list" placeholder="例如: 80" required>
          <datalist id="dia-list">
            <option value="60"><option value="70"><option value="80">
            <option value="90"><option value="100">
          </datalist>
        </div>

        <div class="input-group">
          <label for="systolic">收縮壓 (高壓)：</label>
          <input type="number" id="systolic" list="sys-list" placeholder="例如: 120" required>
          <datalist id="sys-list">
            <option value="100"><option value="110"><option value="120">
            <option value="130"><option value="140"><option value="150">
          </datalist>
        </div>

        <div class="input-group">
          <label for="pulse">脈搏：</label>
          <input type="number" id="pulse" list="pulse-list" placeholder="例如: 75" required>
          <datalist id="pulse-list">
            <option value="60"><option value="70"><option value="80">
            <option value="90"><option value="100">
          </datalist>
        </div>

        <button type="submit" class="submit-btn">儲存紀錄</button>
      </form>
    </div>
  </div>

  <div class="card">
    <h3 style="text-align: center; margin-top: 0;">📊 血壓趨勢圖</h3>
    <div class="chart-container">
      <canvas id="bpChart"></canvas>
    </div>
  </div>

  <script>
    let bpChartInstance = null;
    let records = JSON.parse(localStorage.getItem('bpRecords')) || [];

    // 初始化頁面與圖表
    window.onload = () => {
      setDefaultTime();
      renderChart();
    };

    // 處理照片上傳與縮圖
    document.getElementById('photoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      // 產生縮圖
      const imgURL = URL.createObjectURL(file);
      const thumbnail = document.getElementById('thumbnail');
      thumbnail.src = imgURL;
      thumbnail.style.display = 'block';
      document.getElementById('no-image-text').style.display = 'none';

      // 讀取照片 EXIF 資訊，抓取拍攝時間套入輸入框
      EXIF.getData(file, function() {
        const dateTime = EXIF.getTag(this, "DateTimeOriginal");
        if (dateTime) {
          // EXIF 時間格式為 "YYYY:MM:DD HH:MM:SS" -> 轉換為 "YYYY-MM-DDTHH:mm"
          const parts = dateTime.split(' ');
          const dateStr = parts[0].replace(/:/g, '-');
          const timeStr = parts[1].substring(0, 5); 
          document.getElementById('measureTime').value = `${dateStr}T${timeStr}`;
        } else {
          alert('這張照片沒有包含拍攝時間(可能經過LINE傳輸被壓縮或截圖)，已帶入當前時間。');
          setDefaultTime();
        }
      });
    });

    // 預設填入當下時間
    function setDefaultTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('measureTime').value = now.toISOString().slice(0, 16);
    }

    // 處理表單送出
    document.getElementById('bpForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const newRecord = {
        time: document.getElementById('measureTime').value,
        diastolic: parseInt(document.getElementById('diastolic').value),
        systolic: parseInt(document.getElementById('systolic').value),
        pulse: parseInt(document.getElementById('pulse').value)
      };

      // 儲存到陣列並依照時間排序
      records.push(newRecord);
      records.sort((a, b) => new Date(a.time) - new Date(b.time));
      
      // 存入瀏覽器本地空間
      localStorage.setItem('bpRecords', JSON.stringify(records));
      
      alert('紀錄已儲存！');
      
      // 清空數值，保留時間與縮圖準備下一次
      document.getElementById('diastolic').value = '';
      document.getElementById('systolic').value = '';
      document.getElementById('pulse').value = '';
      
      renderChart();
    });

    // 繪製圖表
    function renderChart() {
      const ctx = document.getElementById('bpChart').getContext('2d');
      
      const labels = records.map(r => {
        const d = new Date(r.time);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
      });
      const systolicData = records.map(r => r.systolic);
      const diastolicData = records.map(r => r.diastolic);

      if (bpChartInstance) {
        bpChartInstance.destroy();
      }

      bpChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: '收縮壓 (高壓)',
              data: systolicData,
              borderColor: '#E74C3C',
              backgroundColor: 'rgba(231, 76, 60, 0.1)',
              tension: 0.3,
              fill: true
            },
            {
              label: '舒張壓 (低壓)',
              data: diastolicData,
              borderColor: '#3498DB',
              backgroundColor: 'rgba(52, 152, 219, 0.1)',
              tension: 0.3,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: false,
              suggestedMin: 50,
              suggestedMax: 180
            }
          }
        }
      });
    }
  </script>
</body>
</html>
