<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血壓測量紀錄本</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #20B2AA; /* 湖水綠 */
            --bg-color: #f4f4f9;
        }
        * { box-sizing: border-box; font-family: "Helvetica Neue", Arial, "LiHei Pro", sans-serif; }
        body { margin: 0; padding: 10px; background-color: var(--bg-color); color: #333; }
        
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* 上半部：縮圖與輸入區塊並排 */
        .top-section {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .left-panel, .right-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        
        /* 圖片與上傳 */
        .img-preview {
            width: 100%;
            height: 200px;
            background-color: #eee;
            border-radius: 8px;
            object-fit: contain;
            margin-bottom: 10px;
            border: 1px dashed #ccc;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
            margin-top: auto;
        }
        .btn-submit { background-color: #ff6b6b; margin-top: 10px; }
        .btn-export { background-color: #4a90e2; width: 100%; margin-top: 10px; }
        
        /* 表單欄位 */
        .input-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #555;
        }
        .input-group input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px; /* 防止 iOS 縮放 */
            width: 100%;
        }
        
        /* 圖表區塊 */
        .chart-container {
            width: 100%;
            overflow-x: auto;
            background: #fff;
        }
        canvas {
            width: 100% !important;
            height: 300px !important;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; margin-top: 0;">血壓測量紀錄</h2>

    <div class="card top-section">
        <div class="left-panel">
            <img id="thumbnail" class="img-preview" src="https://via.placeholder.com/150?text=尚未上傳照片" alt="縮圖預覽">
            <input type="file" id="photoInput" accept="image/*" style="display: none;">
            <button class="btn" onclick="document.getElementById('photoInput').click()">📷 選擇相片</button>
        </div>

        <div class="right-panel">
            <div class="input-group">
                <label>量測時間 (年/月/日/點/分)</label>
                <input type="datetime-local" id="measureTime" required>
            </div>
            <div class="input-group">
                <label>收縮壓 (高壓)</label>
                <input type="number" id="sys" list="sysList" placeholder="例: 120" required>
            </div>
            <div class="input-group">
                <label>舒張壓 (低壓)</label>
                <input type="number" id="dia" list="diaList" placeholder="例: 80" required>
            </div>
            <div class="input-group">
                <label>脈搏 (心跳)</label>
                <input type="number" id="pulse" list="pulseList" placeholder="例: 72" required>
            </div>
            <button class="btn btn-submit" onclick="saveRecord()">💾 送出紀錄</button>
        </div>
    </div>

    <datalist id="sysList"></datalist>
    <datalist id="diaList"></datalist>
    <datalist id="pulseList"></datalist>

    <div class="card" id="export-area">
        <h3 style="margin-top: 0;">紀錄圖表</h3>
        <div class="chart-container">
            <canvas id="bpChart"></canvas>
        </div>
    </div>
    
    <button class="btn btn-export" onclick="exportToPDF()">📄 匯出 PDF</button>

    <script>
        let bpRecords = JSON.parse(localStorage.getItem('bpRecords')) || [];
        let bpChartInstance = null;

        // 初始化：產生下拉數值選項 (輔助滾輪)
        function initDatalists() {
            const sysList = document.getElementById('sysList');
            const diaList = document.getElementById('diaList');
            const pulseList = document.getElementById('pulseList');
            
            for(let i=80; i<=200; i+=5) sysList.innerHTML += `<option value="${i}">`;
            for(let i=50; i<=130; i+=5) diaList.innerHTML += `<option value="${i}">`;
            for(let i=50; i<=120; i+=5) pulseList.innerHTML += `<option value="${i}">`;
        }

        // 初始化：設定當前時間至欄位
        function setDefaultTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('measureTime').value = now.toISOString().slice(0,16);
        }

        // 處理照片上傳與 EXIF 時間抓取
        document.getElementById('photoInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 1. 產生縮圖
            const imgURL = URL.createObjectURL(file);
            document.getElementById('thumbnail').src = imgURL;

            // 2. 抓取照片建立時間 (套進手動修改框)
            try {
                let exifData = await exifr.parse(file);
                let photoDate = exifData && exifData.DateTimeOriginal ? exifData.DateTimeOriginal : new Date(file.lastModified);
                
                // 調整為 datetime-local 格式 (YYYY-MM-DDTHH:mm)
                photoDate.setMinutes(photoDate.getMinutes() - photoDate.getTimezoneOffset());
                document.getElementById('measureTime').value = photoDate.toISOString().slice(0,16);
            } catch(err) {
                console.log("無法讀取 EXIF，使用檔案最後修改時間");
                let fallbackDate = new Date(file.lastModified);
                fallbackDate.setMinutes(fallbackDate.getMinutes() - fallbackDate.getTimezoneOffset());
                document.getElementById('measureTime').value = fallbackDate.toISOString().slice(0,16);
            }
        });

        // 儲存紀錄
        function saveRecord() {
            const time = document.getElementById('measureTime').value;
            const sys = parseInt(document.getElementById('sys').value);
            const dia = parseInt(document.getElementById('dia').value);
            const pulse = parseInt(document.getElementById('pulse').value);

            if (!time || !sys || !dia || !pulse) {
                alert("請填寫所有欄位！");
                return;
            }

            bpRecords.push({ time, sys, dia, pulse });
            // 依照時間排序
            bpRecords.sort((a, b) => new Date(a.time) - new Date(b.time));
            
            // 存入 LocalStorage，確保舊紀錄延續使用
            localStorage.setItem('bpRecords', JSON.stringify(bpRecords));
            
            alert("紀錄成功！");
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('pulse').value = '';
            renderChart();
        }

        // 自定義 Chart.js 插件：依照量測日期繪製雙色交替背景
        const alternatingDateBackground = {
            id: 'alternatingDateBackground',
            beforeDraw: (chart) => {
                const { ctx, chartArea: { top, bottom, left, right }, scales: { x } } = chart;
                if (!x.ticks.length) return;

                ctx.save();
                let currentDateStr = "";
                let isTeal = false;
                let startX = left;

                for (let i = 0; i < x.ticks.length; i++) {
                    const label = x.ticks[i].label || chart.data.labels[i];
                    // 擷取日期部分 (YYYY/MM/DD)
                    const dateStr = label.split(' ')[0]; 

                    if (i === 0) {
                        currentDateStr = dateStr;
                    } else if (dateStr !== currentDateStr) {
                        // 日期改變，繪製前一個區塊
                        const endX = x.getPixelForTick(i);
                        ctx.fillStyle = isTeal ? 'rgba(32, 178, 170, 0.15)' : 'rgba(255, 255, 255, 1)'; // 湖水綠與白色
                        ctx.fillRect(startX, top, endX - startX, bottom - top);
                        
                        startX = endX;
                        currentDateStr = dateStr;
                        isTeal = !isTeal; // 切換顏色
                    }
                }
                // 畫最後一個區塊
                ctx.fillStyle = isTeal ? 'rgba(32, 178, 170, 0.15)' : 'rgba(255, 255, 255, 1)';
                ctx.fillRect(startX, top, right - startX, bottom - top);
                ctx.restore();
            }
        };

        // 繪製與更新圖表
        function renderChart() {
            if (bpChartInstance) bpChartInstance.destroy();
            
            const labels = bpRecords.map(r => r.time.replace('T', ' '));
            const sysData = bpRecords.map(r => r.sys);
            const diaData = bpRecords.map(r => r.dia);

            const ctx = document.getElementById('bpChart').getContext('2d');
            bpChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '收縮壓', data: sysData, borderColor: '#ff6b6b', backgroundColor: '#ff6b6b', tension: 0.3 },
                        { label: '舒張壓', data: diaData, borderColor: '#4a90e2', backgroundColor: '#4a90e2', tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { maxRotation: 45, minRotation: 45, font: { size: 10 } } },
                        y: { suggestedMin: 50, suggestedMax: 180 }
                    },
                    plugins: {
                        legend: { position: 'top' }
                    }
                },
                plugins: [alternatingDateBackground] // 載入雙色交替插件
            });
        }

        // 匯出 PDF
        function exportToPDF() {
            if(bpRecords.length === 0) {
                alert("目前沒有資料可以匯出。");
                return;
            }
            const element = document.getElementById('export-area');
            const opt = {
                margin:       10,
                filename:     '血壓紀錄表.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            // 執行匯出
            html2pdf().set(opt).from(element).save();
        }

        // 頁面載入時執行
        window.onload = () => {
            initDatalists();
            setDefaultTime();
            renderChart();
        };
    </script>
</body>
</html>
